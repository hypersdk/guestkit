# Example KubeVirt manifests generated by GuestKit migration planner.
# Replace namespace, storage class, and import URL for your cluster.
---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: migrated-vm-01-disk
  namespace: zyvor
  labels:
    app: zyvor
    guestkit.zyvor.dev/target: kubevirt
spec:
  source:
    http:
      url: http://minio.zyvor.svc:9000/vm-images/migrated-vm-01.qcow2
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 40Gi
    storageClassName: longhorn
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: migrated-vm-01
  namespace: zyvor
  labels:
    app: zyvor
    guestkit.zyvor.dev/migration-score: "82"
spec:
  running: false
  template:
    metadata:
      labels:
        kubevirt.io/domain: migrated-vm-01
    spec:
      domain:
        cpu:
          cores: 4
        resources:
          requests:
            memory: 8Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              ports: []
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          persistentVolumeClaim:
            claimName: migrated-vm-01-disk
