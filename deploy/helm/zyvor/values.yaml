namespace: zyvor

ingress:
  enabled: true
  className: nginx
  hosts:
    ui: console.zyvor.local
    api: api.zyvor.local
    agentMtls: agent-api.zyvor.local

networkPolicy:
  enabled: true

guestkitWorker:
  image: guestkit-worker:latest
  replicas: 2
  transport: redis
  privileged: true
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 8Gi

zyvorApi:
  image: zyvor-api:latest
  replicas: 1
  storageClass: longhorn
  defaultNamespace: zyvor
  privileged: false
  # Optional default for live VM agent-proxy (e.g. http://127.0.0.1:8765)
  agentProxyUrl: ""
  agentProxy:
    enabled: false
    vsockPort: 1234
    listen: "127.0.0.1:8765"
  agentMtls:
    enabled: true
    bindAddr: "0.0.0.0:8443"
    serverSans: "localhost,zyvor-api,api.zyvor.local,agent-api.zyvor.local"
  auth:
    enabled: false
    jwtSecret: ""          # set via secret when auth.enabled=true
    jwtIssuer: guestkit
    jwtExpiryHours: 24
    defaultRole: operator
    publicBaseUrl: "http://api.zyvor.local"
    uiBaseUrl: "http://console.zyvor.local"
    nfsMountRoot: "/mnt/nfs"
    oidc:
      issuerUrl: ""
      clientId: ""
      clientSecret: ""     # set via secret when provided
      buttonLabel: "Sign in with SSO"
    saml:
      enabled: false
      entityId: ""
      ssoUrl: ""
      metadataUrl: ""
      certificatePem: ""
      buttonLabel: "Sign in with SAML"
  service:
    type: ClusterIP
    nodePort: 30080

zyvorUi:
  image: zyvor-ui:latest
  replicas: 1
  service:
    type: ClusterIP
    nodePort: 30081

postgresql:
  image: postgres:16-alpine
  user: zyvor
  password: zyvor
  database: zyvor

redis:
  image: redis:7-alpine

minio:
  enabled: true
  image: minio/minio:latest
  accessKey: zyvor
  secretKey: zyvor-secret
  service:
    type: ClusterIP
    nodePort: 30090

persistence:
  vmImages:
    size: 100Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce
    # Set hostPath on single-node k3s (shared API + worker image store)
    hostPath: ""

kubevirt:
  enabled: false

vmtools:
  installCrds: true
  defaultPolicy:
    enabled: true
    autoInstall: false
    autoUpgrade: false
    maxConcurrent: 3
  bundle:
    enabled: true
    version: "0.1.0"
    channel: stable
    baseUrl: ""
  reconcile:
    enabled: false
    schedule: "*/15 * * * *"
    image: curlimages/curl:8.5.0
    preferIso: false