apiVersion: apps/v1
kind: Deployment
metadata:
  name: zyvor-ui
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.zyvorUi.replicas }}
  selector:
    matchLabels:
      app: zyvor-ui
  template:
    metadata:
      labels:
        app: zyvor-ui
    spec:
      containers:
        - name: zyvor-ui
          image: {{ .Values.zyvorUi.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: ZYVOR_API_URL
              value: http://zyvor-api:8080/api/v1
---
apiVersion: v1
kind: Service
metadata:
  name: zyvor-ui
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.zyvorUi.service.type }}
  selector:
    app: zyvor-ui
  ports:
    - port: 80
      targetPort: 80
      {{- if eq .Values.zyvorUi.service.type "NodePort" }}
      nodePort: {{ .Values.zyvorUi.service.nodePort }}
      {{- end }}
