apiVersion: v1
kind: Secret
metadata:
  name: zyvor-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  postgresql-password: {{ .Values.postgresql.password | quote }}
  minio-access-key: {{ .Values.minio.accessKey | quote }}
  minio-secret-key: {{ .Values.minio.secretKey | quote }}
  # Full DSN kept in the Secret so the password is never rendered into the
  # API Deployment's plaintext env (visible via `kubectl describe`).
  database-url: {{ printf "postgres://%s:%s@postgresql:5432/%s" .Values.postgresql.user .Values.postgresql.password .Values.postgresql.database | quote }}
