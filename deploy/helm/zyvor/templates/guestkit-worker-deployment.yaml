apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestkit-worker
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.guestkitWorker.replicas }}
  selector:
    matchLabels:
      app: guestkit-worker
  template:
    metadata:
      labels:
        app: guestkit-worker
    spec:
      containers:
        - name: guestkit-worker
          image: {{ .Values.guestkitWorker.image }}
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/guestkit-worker"]
          args:
            - daemon
            - --transport
            - {{ .Values.guestkitWorker.transport }}
            - --redis-url
            - redis://redis:6379
            - --results-dir
            - /var/lib/guestkit/results
            - --max-concurrent
            - "4"
            - --api-enabled=false
          env:
            - name: QUEUE_URL
              value: redis://redis:6379
            - name: RUST_LOG
              value: info
          securityContext:
            privileged: {{ .Values.guestkitWorker.privileged }}
          resources:
            {{- toYaml .Values.guestkitWorker.resources | nindent 12 }}
          volumeMounts:
            {{- include "zyvor.vmVolumeMount" . | nindent 12 }}
            - name: results
              mountPath: /var/lib/guestkit/results
      volumes:
        {{- include "zyvor.vmVolume" . | nindent 8 }}
        - name: results
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: guestkit-worker
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: guestkit-worker
  ports:
    - port: 8080
      targetPort: 8080
