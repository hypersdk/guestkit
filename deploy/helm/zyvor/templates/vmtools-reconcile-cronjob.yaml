{{- if and .Values.kubevirt.enabled .Values.vmtools.reconcile.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vmtools-reconcile
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: zyvor
    app.kubernetes.io/component: vmtools
spec:
  schedule: {{ .Values.vmtools.reconcile.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: zyvor
            app.kubernetes.io/component: vmtools-reconcile
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reconcile
              image: {{ .Values.vmtools.reconcile.image | quote }}
              args:
                - -sf
                - -X
                - POST
                - http://zyvor-api:8080/api/v1/vmtools/policy/reconcile
{{- end }}
