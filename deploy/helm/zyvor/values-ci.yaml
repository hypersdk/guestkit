# GitHub Actions / local CI overlay (deploy/scripts/ci-k3s-e2e.sh, k3s-e2e.yml).
# URLs are set at deploy time via --set (NODE_IP from kubectl or hostname -I).
ingress:
  enabled: false

networkPolicy:
  enabled: false

guestkitWorker:
  replicas: 1

zyvorApi:
  storageClass: local-path
  privileged: true
  zeusPublicUrl: ""
  clusterName: "k3s-ci"
  guestkitBinaryUrl: ""
  agentProxyUrl: "http://127.0.0.1:8765"
  agentProxy:
    enabled: true
    vsockPort: 1234
    listen: "127.0.0.1:8765"
  service:
    type: NodePort
    nodePort: 30080

zyvorUi:
  service:
    type: NodePort
    nodePort: 30081

persistence:
  vmImages:
    storageClass: local-path
    accessMode: ReadWriteOnce
    hostPath: /var/lib/zyvor/images
  kubevirtLocalPath: /data/k3s/storage

minio:
  enabled: true
  service:
    type: NodePort
    nodePort: 30092

kubevirt:
  enabled: true

vmtools:
  installCrds: true
  defaultPolicy:
    enabled: true
    autoInstall: true
    autoUpgrade: false
    maxConcurrent: 2
  bundle:
    enabled: true
    version: "0.1.0"
    channel: stable
    baseUrl: ""
  reconcile:
    enabled: true
    schedule: "*/10 * * * *"
    preferIso: false
