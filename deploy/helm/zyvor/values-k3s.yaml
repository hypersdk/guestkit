# k3s / single-node overlay (e.g. deploy-remote-k3s.sh)
ingress:
  enabled: false

networkPolicy:
  enabled: false

guestkitWorker:
  replicas: 1

zyvorApi:
  storageClass: local-path
  privileged: true
  zeusPublicUrl: "http://175.110.114.93:30080"
  clusterName: "k3s-guestkit"
  guestkitBinaryUrl: "http://175.110.114.93:30092/vmtools/linux/zyvor-guest-agent"
  agentProxyUrl: "http://127.0.0.1:8765"
  agentProxy:
    enabled: true
    vsockPort: 1234
    listen: "127.0.0.1:8765"
  service:
    type: NodePort
    nodePort: 30080

zyvorUi:
  service:
    type: NodePort
    nodePort: 30081

persistence:
  vmImages:
    storageClass: local-path
    accessMode: ReadWriteOnce
    hostPath: /var/lib/zyvor/images
  kubevirtLocalPath: /data/k3s/storage

minio:
  enabled: true
  service:
    type: NodePort
    nodePort: 30092

kubevirt:
  enabled: true

vmtools:
  installCrds: true
  defaultPolicy:
    enabled: true
    autoInstall: true
    autoUpgrade: false
    maxConcurrent: 2
  bundle:
    enabled: true
    version: "0.1.0"
    channel: stable
    baseUrl: "http://175.110.114.93:30092/vmtools"
  reconcile:
    enabled: true
    schedule: "*/10 * * * *"
    preferIso: false
