# k3s / single-node overlay (e.g. deploy-remote-k3s.sh)
ingress:
  enabled: false

networkPolicy:
  enabled: false

guestkitWorker:
  replicas: 1

zyvorApi:
  storageClass: local-path
  privileged: true
  zeusPublicUrl: "http://212.8.252.194:30050"
  clusterName: "k3s-guestkit"
  guestkitBinaryUrl: "http://212.8.252.194:30050/api/v1/engines/guestkit/binary"
  service:
    type: NodePort
    nodePort: 30080

zyvorUi:
  service:
    type: NodePort
    nodePort: 30081

persistence:
  vmImages:
    storageClass: local-path
    accessMode: ReadWriteOnce
    hostPath: /var/lib/zyvor/images

minio:
  enabled: true

kubevirt:
  enabled: true

vmtools:
  installCrds: true
  defaultPolicy:
    enabled: true
    autoInstall: true
    autoUpgrade: false
    maxConcurrent: 2
  bundle:
    enabled: true
    version: "0.1.0"
    channel: stable
    baseUrl: "http://212.8.252.194:30050/api/v1/vmtools/bundle"
  reconcile:
    enabled: true
    schedule: "*/10 * * * *"
    preferIso: false
