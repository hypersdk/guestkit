  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>GuestKit — Sign In</title>
  <link rel="stylesheet" href="abyss-tokens.css?v=20260627abyss1" />
  <link rel="stylesheet" href="abyss-shell.css?v=20260627abyss1" />
  <link rel="stylesheet" href="abyss-components.css?v=20260710fix2" />
  <link rel="stylesheet" href="style.css?v=20260627abyss1" />
  <link rel="stylesheet" href="phosphor-tokens.css?v=20260710phosphor3" />
  <link rel="stylesheet" href="phosphor-shell.css?v=20260710phosphor3" />
  <link rel="stylesheet" href="carbon-tokens.css?v=20260710carbon2" />
  <link rel="stylesheet" href="carbon-shell.css?v=20260710carbon2" />
  <link rel="stylesheet" href="solaris-tokens.css?v=20260710solaris1" />
  <link rel="stylesheet" href="solaris-shell.css?v=20260710solaris1" />
  <style>
    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(ellipse 50% 60% at 20% 20%, rgba(99, 102, 241, 0.18), transparent 55%),
        radial-gradient(ellipse 45% 55% at 80% 80%, rgba(139, 92, 246, 0.14), transparent 50%),
        radial-gradient(ellipse 35% 40% at 85% 10%, rgba(20, 184, 166, 0.12), transparent 48%),
        var(--abyss-950);
    }
    .login-card {
      width: min(420px, 100%);
      padding: 2rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-soft);
      background: var(--bg-panel-strong);
      backdrop-filter: blur(24px) saturate(1.8);
      box-shadow: 0 16px 56px rgba(1, 12, 26, 0.60), 0 0 0 1px rgba(99, 102, 241, 0.08);
    }
    .login-card h1 { margin: 0 0 0.35rem; font-size: 1.5rem; }
    .login-card p { margin: 0 0 1.25rem; color: var(--text-secondary); }
    .login-error {
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      background: rgba(212, 90, 90, 0.12);
      color: var(--accent-red);
      font-size: 0.9rem;
    }
    .login-actions { display: grid; gap: 0.75rem; }
    .login-foot { margin-top: 1.25rem; font-size: 0.8rem; color: var(--text-muted); text-align: center; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <img src="img/zavor-logo.webp" width="120" height="40" alt="GuestKit" style="margin-bottom:1rem;" />
      <h1>Sign in to GuestKit</h1>
      <p class="login-subtitle" id="loginSubtitle">Authenticate to access the VM migration console.</p>
      <div class="login-error hidden" id="loginError"></div>
      <div class="login-actions">
        <button type="button" class="btn primary" id="ssoLoginBtn" style="width:100%;">Sign in with SSO</button>
        <button type="button" class="btn glass hidden" id="samlLoginBtn" style="width:100%;">Sign in with SAML</button>
        <button type="button" class="btn glass hidden" id="localBypassBtn" style="width:100%;">Continue without SSO</button>
      </div>
      <p class="login-foot hidden" id="loginFoot">Optional SSO — enable in Settings when you need identity controls.</p>
    </div>
  </div>
  <script src="guestkit-auth.js?v=20260710fix2"></script>
  <script>
    (async function initLogin() {
      const params = new URLSearchParams(window.location.search);
      const err = params.get('error');
      const token = params.get('token');
      const errEl = document.getElementById('loginError');
      const footEl = document.getElementById('loginFoot');
      const ssoBtn = document.getElementById('ssoLoginBtn');
      const samlBtn = document.getElementById('samlLoginBtn');
      const bypassBtn = document.getElementById('localBypassBtn');

      if (err) {
        errEl.textContent = err;
        errEl.classList.remove('hidden');
      }

      if (token) {
        GuestKitAuth.setAuthToken(token);
        try {
          await GuestKitAuth.fetchAuthMe();
        } catch (_) {}
        window.location.replace('index.html');
        return;
      }

      const cfg = await GuestKitAuth.fetchAuthConfig();
      if (!cfg.auth_enabled) {
        window.location.replace('index.html');
        return;
      }

      try {
        const existing = await GuestKitAuth.fetchAuthMe();
        if (existing.authenticated) {
          window.location.replace('index.html');
          return;
        }
      } catch (_) {}

      footEl?.classList.remove('hidden');

      ssoBtn.textContent = cfg.oidc_button_label || 'Sign in with SSO';
      if (!cfg.auth_enabled || !cfg.oidc_enabled) {
        ssoBtn.disabled = true;
        ssoBtn.title = 'OIDC SSO is not configured';
      } else {
        ssoBtn.addEventListener('click', () => GuestKitAuth.startOidcLogin());
      }

      samlBtn.textContent = cfg.saml_button_label || 'Sign in with SAML';
      if (cfg.auth_enabled && cfg.saml_enabled) {
        samlBtn.classList.remove('hidden');
        samlBtn.addEventListener('click', () => GuestKitAuth.startSamlLogin());
      }

      if (cfg.allow_local_bypass || !cfg.auth_enabled) {
        bypassBtn.classList.remove('hidden');
        bypassBtn.addEventListener('click', async () => {
          try {
            if (cfg.auth_enabled) {
              const data = await GuestKitAuth.localBypassLogin();
              if (data?.token) GuestKitAuth.setAuthToken(data.token);
            }
            window.location.href = 'index.html';
          } catch (e) {
            errEl.textContent = e.message || String(e);
            errEl.classList.remove('hidden');
          }
        });
      }
    })();
  </script>
</body>
</html>
