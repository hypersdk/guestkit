name: Publish Zyvor Images

on:
  push:
    branches: [main]
    paths:
      - 'crates/guestkit-worker/**'
      - 'crates/guestkit-job-spec/**'
      - 'crates/guestkit-agent-protocol/**'
      - 'crates/zyvor-api/**'
      - 'deploy/ui/**'
      - 'deploy/scripts/publish-images.sh'
      - 'src/**'
      - '.github/workflows/publish-zyvor-images.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: short SHA)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/hypersdk

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          TAG: ${{ steps.tag.outputs.value }}
          PUSH: '1'
          BUILDER: docker
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./deploy/scripts/publish-images.sh
