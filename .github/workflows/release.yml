name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          sed -n "/## \[${VERSION}\]/,/## \[/p" docs/development/CHANGELOG.md | sed '$d' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog section for ${VERSION}" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false

  build-agent-artifacts:
    name: Build Zeus VM Tools Artifacts
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools genisoimage
          rustup target add x86_64-unknown-linux-musl

      - name: Build Zeus VM Tools artifacts
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: bash packaging/vmtools/build-artifacts.sh

      - name: Upload agent release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          FILES=(
            dist/vmtools/linux/zyvor-vm-tools-linux-amd64.tar.gz
            dist/vmtools/linux/zyvor-vm-tools-linux-amd64.tar.gz.sha256
            "dist/vmtools/linux/zyvor-vm-tools_${VERSION}_amd64.deb"
          )
          if [[ -f dist/vmtools/zyvor-vm-tools.iso ]]; then
            FILES+=(dist/vmtools/zyvor-vm-tools.iso)
          fi
          gh release upload "${TAG}" "${FILES[@]}" --clobber

  publish-release-images:
    name: Publish GHCR Release Images
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish worker, API, and UI images
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          TAG: v${{ needs.create-release.outputs.version }}
          PUSH: "1"
          BUILDER: docker
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x deploy/scripts/publish-images.sh
          REGISTRY=ghcr.io/hypersdk bash deploy/scripts/publish-images.sh

  build-and-upload:
    name: Build and Upload Assets (${{ matrix.arch_suffix }})
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch_suffix: linux-amd64
          - target: x86_64-unknown-linux-musl
            arch_suffix: linux-amd64-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils libsystemd-dev pkg-config

      - name: Install libhivex (glibc build only — enables registry-write)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get install -y libhivex-dev

      - name: Build and package customer bundle
        env:
          GUESTKIT_PACKAGE_VERSION: ${{ needs.create-release.outputs.version }}
          CARGO_TARGET: ${{ matrix.target }}
        run: |
          chmod +x scripts/package-binary-release.sh
          ./scripts/package-binary-release.sh --build --target "${CARGO_TARGET}" --out-dir dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/guestkit-${{ needs.create-release.outputs.version }}-${{ matrix.arch_suffix }}.tar.gz
            dist/guestkit-${{ needs.create-release.outputs.version }}-${{ matrix.arch_suffix }}.tar.gz.sha256

  publish-crate:
    name: Publish to crates.io
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils libsystemd-dev pkg-config

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "Skipping crates.io publish (CARGO_TOKEN not configured)"
            exit 0
          fi
          if ! output=$(cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}" 2>&1); then
            if echo "$output" | grep -qi "already uploaded"; then
              echo "Version already on crates.io, skipping"
              exit 0
            fi
            echo "$output" >&2
            exit 1
          fi

  publish-pypi:
    name: Publish Python wheel to PyPI
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsystemd-dev pkg-config

      - name: Install maturin
        run: pip install --upgrade maturin

      - name: Build and publish wheel
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${PYPI_API_TOKEN}" ]; then
            echo "Skipping PyPI publish (PYPI_API_TOKEN not configured)"
            exit 0
          fi
          maturin build --release --bindings pyo3 --features python-bindings --out dist
          maturin upload --username __token__ --password "${PYPI_API_TOKEN}" dist/*.whl --skip-existing
