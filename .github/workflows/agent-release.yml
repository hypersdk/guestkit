name: Agent Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-agent-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Build zyvor-guest-agent (musl)
        run: |
          cargo build --release --features agent --no-default-features \
            --target x86_64-unknown-linux-musl --bin zyvor-guest-agent

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/zyvor-guest-agent dist/zyvor-guest-agent-linux-amd64
          cp templates/agent/zyvor-guest-agent.service dist/
          tar czf zyvor-vm-tools-linux-amd64.tar.gz -C dist zyvor-guest-agent-linux-amd64 zyvor-guest-agent.service

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zyvor-vm-tools-linux-amd64
          path: zyvor-vm-tools-linux-amd64.tar.gz
